<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>운동 트래커 v2</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="운동">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      padding-bottom: 90px;
    }

    header {
      background: #1a1a2e;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    header h1 { font-size: 18px; font-weight: 700; }
    .date { font-size: 12px; color: #aaa; margin-top: 3px; }
    .intensity { font-size: 16px; letter-spacing: 2px; }

    .routine-tabs {
      display: flex;
      overflow-x: auto;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a3e;
      padding: 0 8px;
      scrollbar-width: none;
    }
    .routine-tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      padding: 10px 16px;
      font-size: 13px;
      color: #666;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
    }
    .tab.active { color: #7c83ff; border-bottom-color: #7c83ff; }
    .tab.today::after { content: ' •'; color: #4caf50; }

    .exercise-list { padding: 12px 16px; }

    .exercise-card {
      background: #1e1e2e;
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .exercise-card.main-lift { border-left: 3px solid #7c83ff; }

    .exercise-header { padding: 14px 16px 10px; }
    .exercise-name { font-size: 16px; font-weight: 600; }
    .exercise-meta { font-size: 12px; color: #888; margin-top: 4px; }
    .exercise-prev { font-size: 11px; color: #5a6cd9; margin-top: 6px; }
    .exercise-target { font-size: 13px; color: #4caf50; margin-top: 4px; font-weight: 600; }

    .sets-header {
      display: grid;
      grid-template-columns: 30px 1fr 1fr 38px;
      gap: 4px;
      padding: 6px 16px;
      font-size: 11px;
      color: #555;
      text-align: center;
      border-top: 1px solid #2a2a3e;
    }
    .sets-header span:first-child { text-align: left; }

    .set-row {
      display: grid;
      grid-template-columns: 30px 1fr 1fr 38px;
      gap: 4px;
      padding: 5px 16px;
      align-items: center;
      border-top: 1px solid #2a2a3e;
    }

    .set-num { font-size: 12px; color: #666; text-align: center; }

    .set-input {
      background: #2a2a3e;
      border: 1px solid #3a3a4e;
      border-radius: 8px;
      color: #eee;
      font-size: 15px;
      padding: 8px 4px;
      text-align: center;
      width: 100%;
      outline: none;
      -webkit-appearance: none;
    }
    .set-input:focus { border-color: #7c83ff; }
    .set-input::placeholder { color: #444; font-size: 13px; }

    .set-done {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid #3a3a4e;
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin: 0 auto;
      color: transparent;
      font-size: 14px;
      transition: all 0.15s;
    }
    .set-done.checked {
      background: #4caf50;
      border-color: #4caf50;
      color: white;
    }

    .add-set-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 8px 16px 14px;
      padding: 8px;
      background: none;
      border: 1px dashed #333;
      border-radius: 8px;
      color: #555;
      font-size: 13px;
      cursor: pointer;
    }
    .add-set-btn:active { background: #2a2a3e; }

    .preview-note {
      padding: 12px 16px 14px;
      color: #555;
      font-size: 12px;
      text-align: center;
      font-style: italic;
    }

    .free-day {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .free-day .emoji { font-size: 48px; margin-bottom: 16px; }
    .free-day h2 { font-size: 18px; color: #aaa; margin-bottom: 16px; font-weight: 600; }
    .free-day p { font-size: 13px; line-height: 1.8; color: #777; }
    .free-day em { color: #d97757; font-style: normal; font-size: 12px; }

    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px 16px;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      gap: 10px;
    }

    .copy-btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      background: #7c83ff;
      color: white;
      transition: background 0.2s;
    }
    .copy-btn.copied { background: #4caf50; }
    .copy-btn:active { opacity: 0.85; }

    .reset-btn {
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 13px;
      border: 1px solid #333;
      background: none;
      color: #777;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      background: #4caf50;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      z-index: 999;
      max-width: 90%;
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.deload { background: #d97757; }
  </style>
</head>
<body>

<header>
  <div>
    <h1 id="routineName">오늘 루틴</h1>
    <div class="date" id="todayDate"></div>
  </div>
  <div class="intensity" id="intensityStars"></div>
</header>

<div class="routine-tabs" id="routineTabs"></div>
<div class="exercise-list" id="exerciseList"></div>

<div class="bottom-bar">
  <button class="copy-btn" id="copyBtn" onclick="finishSession()">세션 종료 + 복사</button>
  <button class="reset-btn" onclick="resetDay()">초기화</button>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS = ['일','월','화','수','목','금','토'];

// === 운동 정의 ===
const exercises = {
  // 메인 컴파운드 (5x5 진행 룰)
  back_squat:    { name: '백 스쿼트',         is_main: true,  default_sets: 5, target_reps: 5, increment: 2.5, start: 50 },
  bench_press:   { name: '벤치프레스',         is_main: true,  default_sets: 5, target_reps: 5, increment: 2.5, start: 40 },
  machine_ohp:   { name: '머신 숄더프레스',    is_main: true,  default_sets: 4, target_reps: 7, increment: 2.5, start: 27.5 },
  deadlift:      { name: '데드리프트',         is_main: true,  default_sets: 5, target_reps: 5, increment: 5,   start: 60 },

  // 보조 (횟수 진행)
  lateral_raise:     { name: '사이드 레터럴 레이즈', is_main: false, default_sets: 4, rep_range: '12-15', rest: '60s' },
  cable_pushdown:    { name: '케이블 푸시다운',      is_main: false, default_sets: 3, rep_range: '12-15', rest: '60s' },
  dumbbell_curl:     { name: '덤벨/케이블 컬',       is_main: false, default_sets: 3, rep_range: '10-12', rest: '60s' },
  hanging_leg_raise: { name: '행잉 니레이즈',         is_main: false, default_sets: 3, rep_range: '10-15', rest: '60s' },
  pullup_shoulder:   { name: '풀업 (어깨넓이)',       is_main: false, default_sets: 4, rep_range: '6-8',   rest: '2분' },
  barbell_row:       { name: '바벨/시티드 로우',     is_main: false, default_sets: 3, rep_range: '8-10',  rest: '90s' },
  face_pull:         { name: '페이스풀',             is_main: false, default_sets: 3, rep_range: '12-15', rest: '60s' }
};

// === 분할 정의 ===
const splits = {
  wed_pump: {
    name: '수 — 약점 펌프 (30분)',
    intensity: '★',
    exercises: ['lateral_raise', 'cable_pushdown', 'dumbbell_curl', 'hanging_leg_raise']
  },
  thu_push_squat: {
    name: '목 — Push + Squat',
    intensity: '★★★',
    exercises: ['back_squat', 'bench_press', 'machine_ohp', 'cable_pushdown', 'lateral_raise', 'dumbbell_curl']
  },
  fri_pull_deadlift: {
    name: '금 — Pull + Deadlift',
    intensity: '★★★',
    exercises: ['deadlift', 'pullup_shoulder', 'barbell_row', 'dumbbell_curl', 'face_pull', 'hanging_leg_raise']
  }
};

// 요일 → 분할 (0=일, 3=수, 4=목, 5=금)
const daySplit = { 3: 'wed_pump', 4: 'thu_push_squat', 5: 'fri_pull_deadlift' };

// === 저장소 (localStorage) ===
let store = { sessions: {}, progression: {}, meta: { version: 2 } };
try {
  const saved = localStorage.getItem('workoutState_v2');
  if (saved) {
    const parsed = JSON.parse(saved);
    store = { sessions: {}, progression: {}, meta: { version: 2 }, ...parsed };
  }
} catch(e) { console.error(e); }

function save() {
  localStorage.setItem('workoutState_v2', JSON.stringify(store));
}

// === 헬퍼 ===
function todayDateStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getTargetWeight(exId) {
  const ex = exercises[exId];
  if (!ex.is_main) return null;
  const p = store.progression[exId];
  return p ? p.current_weight_kg : ex.start;
}

function getLastSessionFor(exId) {
  const dates = Object.keys(store.sessions).sort().reverse();
  const today = todayDateStr();
  for (const date of dates) {
    if (date === today) continue;
    const sess = store.sessions[date];
    if (sess.exercises && sess.exercises[exId]) {
      const sets = (sess.exercises[exId] || []).filter(s => s.w || s.r);
      if (sets.length) return { date, sets };
    }
  }
  return null;
}

function judgeMain(exId, sets) {
  const ex = exercises[exId];
  if (!ex.is_main) return null;

  // 최소 세트 수 확인
  const validSets = sets.filter(s => s.r && s.r !== '');
  if (validSets.length < ex.default_sets) return null;

  // 5x5 모두 target_reps 이상 달성?
  const allHit = validSets.slice(0, ex.default_sets).every(s => parseInt(s.r) >= ex.target_reps);

  if (!store.progression[exId]) {
    store.progression[exId] = {
      current_weight_kg: ex.start,
      consecutive_failures: 0,
      last_success_date: null,
      last_failure_date: null
    };
  }

  const p = store.progression[exId];
  const today = todayDateStr();

  if (allHit) {
    p.current_weight_kg += ex.increment;
    p.consecutive_failures = 0;
    p.last_success_date = today;
    return { result: 'success', new_weight: p.current_weight_kg };
  } else {
    p.consecutive_failures++;
    p.last_failure_date = today;
    if (p.consecutive_failures >= 2) {
      p.current_weight_kg = Math.round((p.current_weight_kg * 0.9) / 2.5) * 2.5;
      p.consecutive_failures = 0;
      return { result: 'deload', new_weight: p.current_weight_kg };
    }
    return { result: 'fail', new_weight: p.current_weight_kg };
  }
}

// === 세션 ===
function getTodaySession() {
  const dateStr = todayDateStr();
  if (!store.sessions[dateStr]) {
    const weekday = new Date().getDay();
    const splitId = daySplit[weekday] || 'free';
    store.sessions[dateStr] = {
      date: dateStr,
      weekday,
      split: splitId,
      exercises: {},
      completed: false
    };
    save();
  }
  return store.sessions[dateStr];
}

let viewSplit = null;

function init() {
  const now = new Date();
  document.getElementById('todayDate').textContent =
    `${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()} (${DAYS[now.getDay()]})`;
  viewSplit = daySplit[now.getDay()] || 'free';
  renderTabs();
  render();
}

function renderTabs() {
  const tabs = document.getElementById('routineTabs');
  tabs.innerHTML = '';
  const order = ['wed_pump', 'thu_push_squat', 'fri_pull_deadlift', 'free'];
  const labels = { wed_pump: '수 보조', thu_push_squat: '목 P+S', fri_pull_deadlift: '금 P+D', free: '자유' };
  const todaySplit = daySplit[new Date().getDay()] || 'free';

  order.forEach(splitId => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (splitId === viewSplit ? ' active' : '') + (splitId === todaySplit ? ' today' : '');
    tab.textContent = labels[splitId];
    tab.onclick = () => { viewSplit = splitId; renderTabs(); render(); };
    tabs.appendChild(tab);
  });
}

function render() {
  const list = document.getElementById('exerciseList');

  if (viewSplit === 'free') {
    document.getElementById('routineName').textContent = '자유 영역';
    document.getElementById('intensityStars').textContent = '';
    list.innerHTML = `
      <div class="free-day">
        <div class="emoji">🚴</div>
        <h2>오늘은 자유</h2>
        <p>
          <b>토</b> — 가벼운 자전거 OR 휴식<br>
          <b>일</b> — 자전거/맨몸/휴식 자유<br>
          <b>월</b> — 휴식 강력 권장 (목 빅데이 회복)<br>
          <b>화</b> — 자전거/맨몸/휴식 자유<br><br>
          <em>헬스 외 빡센 다리 운동 X</em>
        </p>
      </div>
    `;
    return;
  }

  const split = splits[viewSplit];
  if (!split) return;

  document.getElementById('routineName').textContent = split.name;
  document.getElementById('intensityStars').textContent = split.intensity;

  const todayWeekday = new Date().getDay();
  const isToday = (daySplit[todayWeekday] === viewSplit);

  let session = null;
  if (isToday) session = getTodaySession();

  list.innerHTML = '';

  split.exercises.forEach(exId => {
    const ex = exercises[exId];
    const card = document.createElement('div');
    card.className = 'exercise-card' + (ex.is_main ? ' main-lift' : '');

    let metaText = '';
    let targetText = '';
    let prevText = '';

    if (ex.is_main) {
      const target = getTargetWeight(exId);
      metaText = `${ex.default_sets}×${ex.target_reps} · 휴식 3분`;
      targetText = `오늘 목표: ${target}kg × ${ex.default_sets}×${ex.target_reps}`;
    } else {
      metaText = `${ex.default_sets}×${ex.rep_range} · 휴식 ${ex.rest}`;
    }

    const last = getLastSessionFor(exId);
    if (last) {
      const summary = last.sets.map(s => `${s.w||'-'}×${s.r||'-'}`).join(', ');
      prevText = `지난번 (${last.date.slice(5)}): ${summary}`;
    }

    card.innerHTML = `
      <div class="exercise-header">
        <div class="exercise-name">${ex.name}</div>
        <div class="exercise-meta">${metaText}</div>
        ${prevText ? `<div class="exercise-prev">${prevText}</div>` : ''}
        ${targetText ? `<div class="exercise-target">${targetText}</div>` : ''}
      </div>
      ${isToday ? `
        <div class="sets-header">
          <span>세트</span><span>무게</span><span>횟수</span><span></span>
        </div>
        <div id="rows-${exId}"></div>
        <button class="add-set-btn" onclick="addSet('${exId}')">+ 세트 추가</button>
      ` : `
        <div class="preview-note">미리보기 (오늘 아님)</div>
      `}
    `;
    list.appendChild(card);

    if (isToday) {
      if (!session.exercises[exId]) {
        const target = ex.is_main ? getTargetWeight(exId) : '';
        session.exercises[exId] = Array.from({length: ex.default_sets}, () => ({
          w: target ? String(target) : '',
          r: '',
          done: false
        }));
        save();
      }
      renderRows(exId);
    }
  });
}

function renderRows(exId) {
  const container = document.getElementById(`rows-${exId}`);
  if (!container) return;
  const session = getTodaySession();
  const sets = session.exercises[exId] || [];
  container.innerHTML = '';
  sets.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'set-row';
    row.innerHTML = `
      <div class="set-num">${i+1}</div>
      <input class="set-input" type="text" inputmode="decimal" placeholder="무게/핀"
        value="${s.w}" onchange="upd('${exId}',${i},'w',this.value)">
      <input class="set-input" type="number" inputmode="numeric" placeholder="횟수"
        value="${s.r}" onchange="upd('${exId}',${i},'r',this.value)">
      <button class="set-done${s.done?' checked':''}"
        onclick="toggleDone('${exId}',${i})">✓</button>
    `;
    container.appendChild(row);
  });
}

function upd(exId, i, field, val) {
  const session = getTodaySession();
  if (!session.exercises[exId]) return;
  session.exercises[exId][i][field] = val;
  save();
}

function toggleDone(exId, i) {
  const session = getTodaySession();
  if (!session.exercises[exId]) return;
  session.exercises[exId][i].done = !session.exercises[exId][i].done;
  save();
  renderRows(exId);
}

function addSet(exId) {
  const session = getTodaySession();
  if (!session.exercises[exId]) session.exercises[exId] = [];
  session.exercises[exId].push({w:'', r:'', done:false});
  save();
  renderRows(exId);
}

// === 세션 종료 + 진행 판정 + 결과 복사 ===
function finishSession() {
  const session = getTodaySession();
  if (session.split === 'free') {
    showToast('자유 영역 — 기록 X');
    return;
  }

  const split = splits[session.split];
  const judgments = [];

  // 메인 컴파운드 진행 판정
  split.exercises.forEach(exId => {
    const ex = exercises[exId];
    if (!ex.is_main) return;
    const sets = session.exercises[exId] || [];
    const judged = judgeMain(exId, sets);
    if (judged) judgments.push({ exId, ...judged });
  });

  session.completed = true;
  save();

  // 결과 텍스트 생성
  const lines = [`${session.date} (${DAYS[session.weekday]}, ${split.name})`, ''];
  split.exercises.forEach(exId => {
    const ex = exercises[exId];
    const sets = (session.exercises[exId] || []).filter(s => s.w || s.r || s.done);
    if (!sets.length) return;
    const detail = sets.map(s => `${s.w||'-'}×${s.r||'-'}${s.done?'✓':''}`).join(', ');
    lines.push(`- ${ex.name}: ${sets.length}세트 (${detail})`);
  });

  if (judgments.length) {
    lines.push('', '[진행]');
    judgments.forEach(j => {
      const ex = exercises[j.exId];
      if (j.result === 'success') lines.push(`- ${ex.name}: ✓ 성공 → 다음 ${j.new_weight}kg`);
      else if (j.result === 'fail') lines.push(`- ${ex.name}: 실패 (연속 ${store.progression[j.exId].consecutive_failures}회) → 같은 무게 유지`);
      else if (j.result === 'deload') lines.push(`- ${ex.name}: ⚠ 디로드 → ${j.new_weight}kg`);
    });
  }

  const text = lines.join('\n');

  const onCopied = () => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '복사됨!';
    btn.classList.add('copied');

    const deloads = judgments.filter(j => j.result === 'deload');
    if (deloads.length) {
      showToast('디로드: ' + deloads.map(d => exercises[d.exId].name).join(', '), 'deload');
    } else {
      showToast('세션 종료 + 복사됨');
    }

    setTimeout(() => {
      btn.textContent = '세션 종료 + 복사';
      btn.classList.remove('copied');
      render();
    }, 2500);
  };

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(onCopied).catch(() => fallbackCopy(text, onCopied));
  } else {
    fallbackCopy(text, onCopied);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); cb && cb(); } catch(e) {}
  document.body.removeChild(ta);
}

function resetDay() {
  if (!confirm('오늘 기록을 초기화할까요? (진행 상태는 유지)')) return;
  const dateStr = todayDateStr();
  delete store.sessions[dateStr];
  save();
  render();
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type === 'deload' ? ' deload' : '');
  setTimeout(() => t.classList.remove('show'), 3500);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

init();
</script>
</body>
</html>
