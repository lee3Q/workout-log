<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>운동일지</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #0f0f1a;
    --bg2: #1a1a2e;
    --bg3: #252540;
    --accent: #7ec8c8;
    --accent2: #5fa8a8;
    --text: #e8e8f0;
    --text2: #a0a0b8;
    --danger: #e07070;
    --warn: #e0c070;
    --success: #70c870;
    --border: #2e2e50;
    --radius: 12px;
    --timer-size: 200px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 16px; }
  body { display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }

  /* --- 공통 --- */
  .screen { display: none; flex-direction: column; height: 100vh; overflow-y: auto; }
  .screen.active { display: flex; }

  header {
    background: var(--bg2);
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { font-size: 1rem; font-weight: 600; }
  .scroll-body { flex: 1; overflow-y: auto; padding: 16px; }
  .footer-bar {
    background: var(--bg2);
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px;
    flex-shrink: 0;
  }

  /* buttons */
  button { cursor: pointer; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 600; padding: 12px 18px; transition: opacity 0.15s; }
  button:active { opacity: 0.7; }
  .btn-primary { background: var(--accent); color: #0f0f1a; flex: 1; }
  .btn-secondary { background: var(--bg3); color: var(--text); flex: 1; border: 1px solid var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 8px 14px; font-size: 0.875rem; }
  .btn-icon { background: transparent; color: var(--text2); padding: 8px; font-size: 1.3rem; flex: none; }

  /* badge */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
  .badge-recovery { background: #3a2a10; color: var(--warn); }
  .badge-transition { background: #1a3020; color: var(--success); }
  .badge-main { background: #102030; color: var(--accent); }

  /* card */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
  }
  .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
  .card-meta { font-size: 0.82rem; color: var(--text2); }
  .card-prev { font-size: 0.78rem; color: var(--accent2); margin-top: 4px; }

  /* --- 홈 --- */
  #homeDate { font-size: 1.05rem; font-weight: 700; }
  #noWorkoutMsg { text-align: center; padding: 40px 0; color: var(--text2); line-height: 1.8; }

  /* --- 세션 --- */
  #sessionProgress {
    background: var(--bg3);
    height: 4px;
    border-radius: 2px;
    margin: 0;
    flex-shrink: 0;
  }
  #sessionProgressBar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
  #sessionProgressLabel { font-size: 0.8rem; color: var(--text2); text-align: right; padding: 4px 16px 0; flex-shrink: 0; }

  #sessionBody { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }

  #exerciseName { font-size: 1.5rem; font-weight: 800; text-align: center; }
  #setLabel { font-size: 0.9rem; color: var(--text2); text-align: center; }

  .num-input-row { display: flex; align-items: center; gap: 10px; justify-content: center; }
  .num-input-row .label { font-size: 0.85rem; color: var(--text2); min-width: 30px; text-align: right; }
  .num-val { font-size: 1.6rem; font-weight: 800; min-width: 70px; text-align: center; background: var(--bg3); border-radius: 10px; padding: 10px 0; cursor: pointer; }
  .num-val-input { font-size: 1.6rem; font-weight: 800; min-width: 70px; width: 80px; text-align: center; background: var(--bg3); border: 2px solid var(--accent); border-radius: 10px; padding: 8px 0; color: var(--text); }
  .num-btn { width: 52px; height: 52px; background: var(--bg3); color: var(--text); font-size: 1.2rem; font-weight: 700; border-radius: 10px; padding: 0; flex: none; }

  /* timer */
  #timerSection { display: none; flex-direction: column; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 5; background: var(--bg); padding: 8px 0; }
  #timerSection.visible { display: flex; }
  #timerSvg { width: var(--timer-size); height: var(--timer-size); }
  #timerTrack { fill: none; stroke: var(--bg3); stroke-width: 12; }
  #timerArc { fill: none; stroke: var(--accent); stroke-width: 12; stroke-linecap: round; transform-origin: center; transform: rotate(-90deg); transition: stroke-dashoffset 1s linear; }
  #timerText { font-size: 2.8rem; font-weight: 800; fill: var(--text); text-anchor: middle; dominant-baseline: middle; }
  .timer-btns { display: flex; gap: 10px; }

  #stretchHint { background: var(--bg3); border-radius: 10px; padding: 10px 14px; font-size: 0.85rem; color: var(--text2); }
  #stretchHintToggle { color: var(--accent); cursor: pointer; font-size: 0.8rem; margin-left: 6px; }
  #stretchHintDetail { font-size: 0.82rem; color: var(--text2); margin-top: 8px; display: none; line-height: 1.7; }
  #stretchHintDetail.open { display: block; }

  #setHistory { display: flex; flex-wrap: wrap; gap: 6px; }
  .set-chip { background: var(--bg3); border-radius: 20px; padding: 4px 10px; font-size: 0.8rem; color: var(--text2); }
  .set-chip.done { background: var(--accent2); color: #0f0f1a; }

  #sessionFooter { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }

  /* --- 스트레칭 모달 --- */
  #stretchModal {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.6);
    align-items: flex-end;
  }
  #stretchModal.open { display: flex; }
  #stretchModalBox {
    background: var(--bg2);
    border-radius: var(--radius) var(--radius) 0 0;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 16px;
  }
  .accordion-item { border-bottom: 1px solid var(--border); }
  .accordion-header {
    padding: 14px 0;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 700;
  }
  .accordion-header .arrow { transition: transform 0.2s; color: var(--text2); }
  .accordion-item.open .arrow { transform: rotate(90deg); }
  .accordion-body { display: none; padding: 0 0 14px; font-size: 0.88rem; color: var(--text2); line-height: 1.9; }
  .accordion-item.open .accordion-body { display: block; }
  .warn-note { color: var(--warn); }

  /* --- 통증 빠른 조정 모달 --- */
  #painModal {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #painModal.open { display: flex; }
  #painModalBox {
    background: var(--bg2);
    border-radius: var(--radius);
    width: 100%;
    max-width: 360px;
    padding: 20px;
  }
  .pain-modal-row { display: flex; align-items: center; gap: 10px; margin: 12px 0; }
  .pain-modal-row label { min-width: 60px; font-size: 0.9rem; }
  .pain-modal-row input[type=range] { flex: 1; accent-color: var(--accent); }
  .pain-modal-row .pain-val { min-width: 20px; text-align: right; font-weight: 700; color: var(--accent); }

  /* --- 저녁 리포트 --- */
  .report-section { background: var(--bg2); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .report-section h3 { font-size: 0.9rem; color: var(--text2); margin-bottom: 10px; font-weight: 600; }
  .session-line { font-size: 0.88rem; color: var(--text); margin: 3px 0; }

  .toggle-row { display: flex; gap: 8px; }
  .toggle-btn { flex: 1; padding: 10px; border-radius: 8px; font-size: 0.9rem; background: var(--bg3); color: var(--text2); border: 2px solid transparent; }
  .toggle-btn.active { border-color: var(--accent); color: var(--accent); }

  label.field-label { display: block; font-size: 0.85rem; color: var(--text2); margin-bottom: 6px; margin-top: 12px; }
  input.num-field { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 12px; font-size: 1rem; width: 80px; }
  textarea.report-ta { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 12px; font-size: 0.9rem; min-height: 80px; resize: vertical; }
  textarea.report-ta::placeholder { color: var(--text2); }

  input[type=range] { width: 100%; accent-color: var(--accent); }
  .slider-row { display: flex; align-items: center; gap: 10px; }
  .slider-row .val { font-weight: 800; color: var(--accent); min-width: 20px; }

  .gemini-block { display: flex; flex-direction: column; gap: 10px; }
  .copy-result { font-size: 0.8rem; color: var(--success); margin-top: 4px; display: none; }

  #geminiPaste { min-height: 120px; }
  #parseResult { font-size: 0.85rem; margin-top: 6px; display: none; }
  #parseResult.ok { color: var(--success); }
  #parseResult.err { color: var(--danger); }

  /* pain dynamic rows */
  #painRows { display: flex; flex-direction: column; gap: 8px; }
  .pain-report-row { display: flex; align-items: center; gap: 10px; }
  .pain-report-row label { min-width: 60px; font-size: 0.9rem; }
  .pain-report-row input[type=range] { flex: 1; accent-color: var(--accent); }
  .pain-report-row .pval { min-width: 20px; font-weight: 700; color: var(--accent); }
  .pain-report-row .del-btn { background: transparent; color: var(--text2); font-size: 1rem; padding: 4px 6px; flex: none; border: none; }

  /* --- 루틴 관리 --- */
  .routine-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    position: relative;
  }
  .routine-card.current { border-color: var(--accent); }
  .routine-card .current-badge { position: absolute; top: 10px; right: 10px; font-size: 0.7rem; background: var(--accent); color: #0f0f1a; padding: 2px 8px; border-radius: 20px; font-weight: 700; }
  .routine-card h4 { font-size: 0.95rem; font-weight: 700; }
  .routine-card .rmeta { font-size: 0.78rem; color: var(--text2); margin-top: 3px; }
  .routine-card .rnotes { font-size: 0.82rem; color: var(--text2); margin-top: 6px; }
  .routine-card-btns { display: flex; gap: 8px; margin-top: 10px; }

  /* toast */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--bg3); color: var(--text); padding: 10px 20px;
    border-radius: 20px; font-size: 0.88rem; z-index: 200;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* cycling inline */
  .cycling-fields { display: flex; gap: 10px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
  .cycling-fields label { font-size: 0.85rem; color: var(--text2); display: flex; align-items: center; gap: 6px; }
</style>
</head>
<body>

<!-- ===== 홈 ===== -->
<div id="screenHome" class="screen active">
  <header>
    <div>
      <div id="homeDate">—</div>
      <div id="homeDateSub" style="font-size:0.8rem;color:var(--text2)"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="phaseBadge" class="badge" style="cursor:pointer" title="탭: 통증 조정">—</span>
      <button class="btn-icon" id="btnEvening" title="저녁 리포트">🌙</button>
    </div>
  </header>
  <div class="scroll-body" id="homeBody">
    <div id="exerciseCards"></div>
  </div>
  <div class="footer-bar">
    <button class="btn-secondary" id="btnStretch">🧘 스트레칭</button>
    <button class="btn-primary" id="btnStartSession">▶ 시작</button>
  </div>
</div>

<!-- ===== 세션 진행 ===== -->
<div id="screenSession" class="screen">
  <div id="sessionProgress"><div id="sessionProgressBar" style="width:0%"></div></div>
  <div id="sessionProgressLabel"></div>
  <div id="sessionBody">
    <div style="text-align:center">
      <div id="exerciseName">—</div>
      <div id="setLabel" style="margin-top:4px">—</div>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="num-input-row">
        <span class="label">무게</span>
        <button class="num-btn" id="wMinus">−2.5</button>
        <div class="num-val" id="wVal" data-val="0">0</div>
        <button class="num-btn" id="wPlus">+2.5</button>
        <span style="font-size:0.8rem;color:var(--text2)">kg</span>
      </div>
      <div class="num-input-row">
        <span class="label">횟수</span>
        <button class="num-btn" id="rMinus">−1</button>
        <div class="num-val" id="rVal" data-val="10">10</div>
        <button class="num-btn" id="rPlus">+1</button>
        <span style="font-size:0.8rem;color:var(--text2)">회</span>
      </div>
    </div>

    <button class="btn-primary" id="btnDoneSet" style="font-size:1.2rem;padding:18px">✓ 완료</button>

    <!-- 타이머 -->
    <div id="timerSection">
      <svg id="timerSvg" viewBox="0 0 200 200">
        <circle id="timerTrack" cx="100" cy="100" r="88"/>
        <circle id="timerArc" cx="100" cy="100" r="88"/>
        <text id="timerText" x="100" y="100">—</text>
      </svg>
      <div class="timer-btns">
        <button class="btn-secondary btn-sm" id="btnTimerAdd">+30s</button>
        <button class="btn-secondary btn-sm" id="btnTimerSkip">건너뛰기</button>
      </div>
    </div>

    <!-- 세트 간 스트레칭 힌트 -->
    <div id="stretchHint" style="display:none">
      <span id="stretchHintText"></span>
      <span id="stretchHintToggle">[자세히]</span>
      <div id="stretchHintDetail"></div>
    </div>

    <!-- 세트 기록 chips -->
    <div>
      <div style="font-size:0.8rem;color:var(--text2);margin-bottom:6px">이번 운동 세트</div>
      <div id="setHistory"></div>
    </div>
  </div>

  <div id="sessionFooter">
    <button class="btn-secondary btn-sm" id="btnAddSet">세트 추가</button>
    <button class="btn-secondary btn-sm" id="btnSkipEx">운동 스킵</button>
    <button class="btn-danger btn-sm" id="btnEndSession">종료</button>
  </div>
</div>

<!-- ===== 저녁 리포트 ===== -->
<div id="screenReport" class="screen">
  <header>
    <div>
      <h1>저녁 리포트</h1>
      <div id="reportDateSub" style="font-size:0.8rem;color:var(--text2)"></div>
    </div>
    <button class="btn-icon" id="btnReportHome">✕</button>
  </header>
  <div class="scroll-body">

    <div class="report-section">
      <h3>오늘 운동 요약</h3>
      <div id="reportSessionSummary"><span style="color:var(--text2)">오늘 운동 없음</span></div>
    </div>

    <div class="report-section">
      <h3>자전거</h3>
      <div class="toggle-row">
        <button class="toggle-btn" id="cycleYes">탔다</button>
        <button class="toggle-btn" id="cycleNo">안탔다</button>
      </div>
      <div class="cycling-fields" id="cyclingFields" style="display:none">
        <label>시간 <input class="num-field" id="cycleMin" type="number" min="0" max="300" value="60" style="width:70px"> 분</label>
        <label>강도 <input class="num-field" id="cycleInt" type="number" min="1" max="10" value="7" style="width:50px"> /10</label>
      </div>
    </div>

    <div class="report-section">
      <h3>식사 메모</h3>
      <textarea class="report-ta" id="mealNote" placeholder="닭가슴살 200g, 현미밥 1공기…"></textarea>
    </div>

    <div class="report-section">
      <h3>컨디션</h3>
      <div class="slider-row">
        <span>1</span>
        <input type="range" id="conditionSlider" min="1" max="10" value="7">
        <span>10</span>
        <span class="val" id="conditionVal">7</span>
      </div>
    </div>

    <div class="report-section">
      <h3>통증 (0 = 없음)</h3>
      <div id="painRows"></div>
      <button class="btn-secondary btn-sm" style="margin-top:10px;flex:none" id="btnAddPain">+ 부위 추가</button>
    </div>

    <div class="report-section">
      <h3>Gemini 피드백</h3>
      <div class="gemini-block">
        <button class="btn-secondary" id="btnCopyPrompt">📋 Gemini 프롬프트 복사</button>
        <div class="copy-result" id="copyResult">클립보드에 복사됨</div>
        <label class="field-label" style="margin-top:14px">Gemini 응답 붙여넣기</label>
        <textarea class="report-ta" id="geminiPaste" placeholder="Gemini 응답 전체를 붙여넣으세요…"></textarea>
        <button class="btn-primary" id="btnParseRoutine">파싱 &amp; 적용</button>
        <div id="parseResult"></div>
      </div>
    </div>

    <div class="footer-bar" style="position:static;margin-top:8px;border-top:none">
      <button class="btn-secondary" id="btnGoRoutines">루틴 관리</button>
      <button class="btn-primary" id="btnSaveReport">저장</button>
    </div>
  </div>
</div>

<!-- ===== 루틴 관리 ===== -->
<div id="screenRoutines" class="screen">
  <header>
    <h1>루틴 관리</h1>
    <button class="btn-icon" id="btnRoutineBack">✕</button>
  </header>
  <div class="scroll-body">
    <div id="routineList"></div>
    <div class="card" style="margin-top:16px">
      <div class="card-title" style="margin-bottom:10px">JSON으로 루틴 추가</div>
      <textarea class="report-ta" id="routineJsonInput" placeholder='{"id":"...","phase":"...","exercises":{...},"days":{...}}' style="min-height:100px"></textarea>
      <button class="btn-primary" style="margin-top:10px;width:100%" id="btnAddRoutine">추가</button>
      <div id="routineAddResult" style="font-size:0.85rem;margin-top:6px;display:none"></div>
    </div>
  </div>
</div>

<!-- ===== 스트레칭 모달 ===== -->
<div id="stretchModal">
  <div id="stretchModalBox">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h2 style="font-size:1.1rem">스트레칭 가이드</h2>
      <button class="btn-icon" id="btnCloseStretch">✕</button>
    </div>
    <div id="accordionList"></div>
  </div>
</div>

<!-- ===== 통증 빠른 조정 모달 ===== -->
<div id="painModal">
  <div id="painModalBox">
    <h3 style="margin-bottom:6px">통증 빠른 조정</h3>
    <p style="font-size:0.82rem;color:var(--text2);margin-bottom:12px">저녁 리포트에서 상세 기록 가능</p>
    <div id="painModalRows"></div>
    <button class="btn-primary" style="width:100%;margin-top:14px" id="btnClosePainModal">확인</button>
  </div>
</div>

<!-- toast -->
<div id="toast"></div>

<script>
// ============================================================
//  CONSTANTS
// ============================================================
const STORAGE_KEY = 'workoutApp_v3';
const WEEKDAYS = ['일','월','화','수','목','금','토'];
const WEEKDAY_KEYS = ['sun','mon','tue','wed','thu','fri','sat'];
function getTodayISO() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}
function getTodayDOW() { return new Date().getDay(); }

const STRETCH_DATA = [
  {
    name: '장요근 스트레칭 (Lifted Hip Flexor)',
    desc: '• 한쪽 무릎 꿇고 반대 발 앞으로 (런지 자세)\n• 골반을 뒤로 감아 넣기 (후방경사)\n• 앞으로 천천히 체중 이동 — 앞허벅지·사타구니 당기는 느낌\n• 호흡 유지, 60초. 반대쪽도.\n⚠ 허리 과신전 X, 골반 말린 상태 유지',
    duration: '60초 × 좌우'
  },

// ============================================================
//  STORAGE
// ============================================================
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveData(d) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
  catch(e) {
    if (e.name === 'QuotaExceededError') toast('저장 공간 부족', 4000);
    else throw e;
  }
}

function initData() {
  let d = loadData();
  if (!d) {
    const seed = makeSeedRoutine();
    d = {
      meta: { version: 3, created_at: new Date().toISOString(), current_routine_id: seed.id },
      routines: { [seed.id]: seed },
      sessions: {}
    };
    saveData(d);
    return d;
  }
  if (!d.sessions) d.sessions = {};
  if (!d.routines) d.routines = {};
  if (Object.keys(d.routines).length === 0) {
    const seed = makeSeedRoutine();
    d.routines[seed.id] = seed;
    d.meta.current_routine_id = seed.id;
    saveData(d);
  }
  return d;
}

// ============================================================
//  HELPERS
// ============================================================
function getCurrentRoutine() {
  return DB.routines[DB.meta.current_routine_id] || Object.values(DB.routines)[0];
}

function getTodayDayKey() {
  return WEEKDAY_KEYS[getTodayDOW()];
}

function getTodayExercises() {
  const r = getCurrentRoutine();
  if (!r) return [];
  return r.days[getTodayDayKey()] || [];
}

function getLastSetRecord(exerciseId) {
  const sessions = Object.values(DB.sessions)
    .filter(s => s.date < getTodayISO())
    .sort((a,b) => b.date.localeCompare(a.date));
  for (const s of sessions) {
    if (!s.exercises) continue;
    const ex = s.exercises.find(e => e.exercise_id === exerciseId);
    if (ex && ex.sets && ex.sets.filter(ss => ss.done).length > 0) return ex.sets;
  }
  return null;
}

function getLastWeightForEx(exerciseId) {
  const sets = getLastSetRecord(exerciseId);
  if (!sets) return null;
  const done = sets.filter(s => s.done);
  return done.length > 0 ? done[done.length - 1].w : null;
}

function parseRepsDefault(reps) {
  if (!reps || reps === 'max') return 10;
  if (reps.endsWith('s')) return 1;
  const m = reps.match(/^(\d+)/);
  return m ? parseInt(m[1]) : 10;
}

function fmtSets(sets) {
  if (!sets || sets.length === 0) return '—';
  return sets.filter(s => s.done).map(s => `${s.w}kg×${s.r}`).join(' / ');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toast(msg, dur) {
  dur = dur || 2500;
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, dur);
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

// ============================================================
//  AUDIO BEEP
// ============================================================
function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 350].forEach(function(offset) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 440;
      const t = ctx.currentTime + offset / 1000;
      gain.gain.setValueAtTime(0.4, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t);
      osc.stop(t + 0.3);
    });
    setTimeout(function() { ctx.close(); }, 1000);
  } catch(e) {}
}

// ============================================================
//  WAKELOCK
// ============================================================
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch(e) {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

function startSession() {
  const todayExs = getTodayExercises();
  if (todayExs.length === 0) return;

  currentSession = {
    date: getTodayISO(),
    weekday: getTodayDOW(),
    routine_id: DB.meta.current_routine_id,
    exercises: todayExs.map(function(item) {
      return {
        exercise_id: item.exercise_id,
        plan_sets: item.sets,
        plan_reps: item.reps,
        extra_sets: 0,
        sets: []
      };
    }),
    pain: { wrist: 0, lower_back: 0 },
    condition: 7,
    cycling: { done: false, minutes: 0, intensity: 0 },
    meal_note: '',
    gemini_response: null,
    started_at: new Date().toISOString(),
    ended_at: null
  };

  sessionExIdx = 0;
  sessionSetIdx = 0;
  requestWakeLock();
  showScreen('screenSession');
  renderSessionExercise();
}

function renderSessionExercise() {
  if (!currentSession) return;
  const exCount = currentSession.exercises.length;
  const pct = Math.round(sessionExIdx / exCount * 100);
  document.getElementById('sessionProgressBar').style.width = pct + '%';
  document.getElementById('sessionProgressLabel').textContent = '운동 ' + (sessionExIdx + 1) + ' / ' + exCount;

  const exEntry = currentSession.exercises[sessionExIdx];
  const routine = getCurrentRoutine();
  const exInfo = routine.exercises[exEntry.exercise_id] || {};

  document.getElementById('exerciseName').textContent = exInfo.name || exEntry.exercise_id;
  renderSetUI(exEntry, exInfo);
}

function renderSetUI(exEntry, exInfo) {
  const totalSets = exEntry.plan_sets + exEntry.extra_sets;
  document.getElementById('setLabel').textContent = '세트 ' + (sessionSetIdx + 1) + ' / ' + totalSets;

  // Determine default weight and reps
  const lastSetW = exEntry.sets.length > 0 ? exEntry.sets[exEntry.sets.length - 1].w : null;
  const lastSetR = exEntry.sets.length > 0 ? exEntry.sets[exEntry.sets.length - 1].r : null;
  const prevSessionW = getLastWeightForEx(exEntry.exercise_id);
  const todayExs = getTodayExercises();
  const plan = todayExs.find(function(x) { return x.exercise_id === exEntry.exercise_id; });
  const startW = plan ? plan.start_weight_kg : null;

  const defaultW = lastSetW !== null ? lastSetW : (prevSessionW !== null ? prevSessionW : (startW !== null ? startW : 0));
  const defaultR = lastSetR !== null ? lastSetR : parseRepsDefault(exEntry.plan_reps);

  const wEl = document.getElementById('wVal');
  const rEl = document.getElementById('rVal');
  wEl.textContent = defaultW;
  wEl.dataset.val = defaultW;
  rEl.textContent = defaultR;
  rEl.dataset.val = defaultR;

  // intra_stretch hint
  const hint = exInfo.intra_stretch;
  const hintEl = document.getElementById('stretchHint');
  if (hint) {
    hintEl.style.display = '';
    document.getElementById('stretchHintText').textContent = '↳ ' + hint.name + ' ' + hint.seconds + 's 권장';
    document.getElementById('stretchHintDetail').textContent = '';
    document.getElementById('stretchHintDetail').classList.remove('open');
  } else {
    hintEl.style.display = 'none';
  }

  renderSetChips(exEntry);
  stopTimer();
}

function renderSetChips(exEntry) {
  const hist = document.getElementById('setHistory');
  hist.innerHTML = '';
  const totalSets = exEntry.plan_sets + exEntry.extra_sets;
  for (let i = 0; i < totalSets; i++) {
    const chip = document.createElement('span');
    const s = exEntry.sets[i];
    if (s && s.done) {
      chip.className = 'set-chip done';
      chip.textContent = s.w + '×' + s.r;
    } else {
      chip.className = 'set-chip';
      chip.textContent = '세트' + (i + 1);
    }
    hist.appendChild(chip);
  }
}

function doneSet() {
  const exEntry = currentSession.exercises[sessionExIdx];
  const w = parseFloat(document.getElementById('wVal').dataset.val) || 0;
  const r = parseInt(document.getElementById('rVal').dataset.val) || 0;
  exEntry.sets[sessionSetIdx] = { w: w, r: r, done: true };

  const totalSets = exEntry.plan_sets + exEntry.extra_sets;
  const routine = getCurrentRoutine();
  const exInfo = routine.exercises[exEntry.exercise_id] || {};

  renderSetChips(exEntry);

  const restS = exInfo.rest_s != null ? exInfo.rest_s : 60;

  if (restS === 0) {
    // No rest: advance immediately without a timer
    if (sessionSetIdx + 1 < totalSets) {
      sessionSetIdx++;
      document.getElementById('setLabel').textContent = '세트 ' + (sessionSetIdx + 1) + ' / ' + totalSets;
      document.getElementById('wVal').textContent = w;
      document.getElementById('wVal').dataset.val = w;
      document.getElementById('rVal').textContent = r;
      document.getElementById('rVal').dataset.val = r;
    } else {
      advanceExercise();
    }
    return;
  }

  if (restS > 0) {
    startTimer(restS);
  }

  if (sessionSetIdx + 1 < totalSets) {
    sessionSetIdx++;
    document.getElementById('setLabel').textContent = '세트 ' + (sessionSetIdx + 1) + ' / ' + totalSets;
    // carry weight/reps forward
    document.getElementById('wVal').textContent = w;
    document.getElementById('wVal').dataset.val = w;
    document.getElementById('rVal').textContent = r;
    document.getElementById('rVal').dataset.val = r;
  }
  // if all sets done: timer end will trigger advanceExercise
}

function allSetsDone(exEntry) {
  const totalSets = exEntry.plan_sets + exEntry.extra_sets;
  return exEntry.sets.filter(function(s) { return s.done; }).length >= totalSets;
}

function advanceExercise() {
  stopTimer();
  sessionExIdx++;
  if (sessionExIdx >= currentSession.exercises.length) {
    endSession();
    return;
  }
  sessionSetIdx = 0;
  renderSessionExercise();
}

function endSession() {
  if (!currentSession) return;
  stopTimer();
  releaseWakeLock();
  currentSession.ended_at = new Date().toISOString();
  DB.sessions[getTodayISO()] = currentSession;
  saveData(DB);
  currentSession = null;
  showScreen('screenReport');
  renderReport();
}

// ============================================================
//  TIMER
// ============================================================
// SVG circle r=88, circumference = 2*PI*88
const CIRCUMFERENCE = 2 * Math.PI * 88;

function startTimer(seconds) {
  stopTimer();
  timerTotal = seconds;
  timerRemain = seconds;
  updateTimerUI();
  document.getElementById('timerSection').classList.add('visible');

  timerInterval = setInterval(function() {
    timerRemain--;
    if (timerRemain <= 0) {
      timerRemain = 0;
      updateTimerUI();
      clearInterval(timerInterval);
      timerInterval = null;
      timerDone();
    } else {
      updateTimerUI();
    }
  }, 1000);
}

function updateTimerUI() {
  const arc = document.getElementById('timerArc');
  const text = document.getElementById('timerText');
  const ratio = timerTotal > 0 ? timerRemain / timerTotal : 0;
  const offset = CIRCUMFERENCE * (1 - ratio);
  arc.style.strokeDasharray = CIRCUMFERENCE;
  arc.style.strokeDashoffset = offset;
  text.textContent = timerRemain + 's';
}

function timerDone() {
  try { navigator.vibrate([200, 100, 200]); } catch(e) {}
  beep();
  document.getElementById('timerSection').classList.remove('visible');
  // advance if current exercise all sets are done
  if (currentSession) {
    const exEntry = currentSession.exercises[sessionExIdx];
    if (exEntry && allSetsDone(exEntry)) {
      advanceExercise();
    }
  }
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('timerSection').classList.remove('visible');
}

// ============================================================
function renderReport() {
  document.getElementById('reportDateSub').textContent = getTodayISO() + ' (' + WEEKDAYS[getTodayDOW()] + ')';

  const session = DB.sessions[getTodayISO()];
  const sumEl = document.getElementById('reportSessionSummary');
  if (session && session.exercises && session.exercises.length > 0) {
    const routine = getCurrentRoutine();
    let html = '';
    session.exercises.forEach(function(ex) {
      const exInfo = routine.exercises[ex.exercise_id] || {};
      const name = exInfo.name || ex.exercise_id;
      const done = (ex.sets || []).filter(function(s) { return s.done; });
      if (done.length > 0) {
        html += '<div class="session-line">' + esc(name) + ': ' + done.map(function(s) { return esc(s.w) + 'kg\xd7' + esc(s.r); }).join(' / ') + '</div>';
      }
    });
    sumEl.innerHTML = html || '<span style="color:var(--text2)">완료된 세트 없음</span>';
  } else {
    sumEl.innerHTML = '<span style="color:var(--text2)">오늘 운동 없음</span>';
  }

  // Pre-fill from existing session
  if (session) {
    if (session.cycling && session.cycling.done) {
      setCycling(true);
      document.getElementById('cycleMin').value = session.cycling.minutes || 60;
      document.getElementById('cycleInt').value = session.cycling.intensity || 7;
    } else {
      setCycling(false);
    }
    document.getElementById('mealNote').value = session.meal_note || '';
    const cond = session.condition || 7;
    document.getElementById('conditionSlider').value = cond;
    document.getElementById('conditionVal').textContent = cond;
    if (session.gemini_response) {
      document.getElementById('geminiPaste').value = session.gemini_response;
    }
  } else {
    setCycling(false);
    document.getElementById('mealNote').value = '';
    document.getElementById('conditionSlider').value = 7;
    document.getElementById('conditionVal').textContent = 7;
    document.getElementById('geminiPaste').value = '';
  }

  document.getElementById('parseResult').style.display = 'none';
  renderPainRows(session ? (session.pain || {}) : {});
}

function renderPainRows(painObj) {
  const container = document.getElementById('painRows');
  container.innerHTML = '';
  const defaults = [
    { key: 'wrist', label: '손목' },
    { key: 'lower_back', label: '허리' }
  ];
  // merge default keys + any extra keys from painObj
  const seen = new Set();
  const combined = [];
  defaults.forEach(function(d) { seen.add(d.key); combined.push(d); });
  Object.keys(painObj).forEach(function(k) {
    if (!seen.has(k)) {
      combined.push({ key: k, label: k });
    }
  });
  combined.forEach(function(item) {
    addPainRow(container, item.key, item.label, painObj[item.key] || 0);
  });
}

function addPainRow(container, key, label, val) {
  const row = document.createElement('div');
  row.className = 'pain-report-row';
  row.dataset.key = key;
  row.innerHTML =
    '<label>' + esc(label) + '</label>' +
    '<input type="range" min="0" max="10" value="' + esc(val) + '" data-key="' + esc(key) + '" oninput="this.nextElementSibling.textContent=this.value">' +
    '<span class="pval">' + esc(val) + '</span>' +
    '<button class="del-btn" onclick="this.closest(\'.pain-report-row\').remove()">✕</button>';
  container.appendChild(row);
}

function collectPainData() {

// ============================================================
//  GEMINI PROMPT BUILDER
// ============================================================
function buildGeminiPrompt() {
  const routine = getCurrentRoutine();
  const session = DB.sessions[getTodayISO()];

  const recent7 = Object.values(DB.sessions)
    .filter(function(s) { return s.date < getTodayISO(); })
    .sort(function(a,b) { return b.date.localeCompare(a.date); })
    .slice(0, 7);

  const recentBlock = recent7.map(function(s) {
    const exSummary = (s.exercises || []).map(function(ex) {
      const exInfo = routine.exercises[ex.exercise_id] || {};
      const done = (ex.sets || []).filter(function(ss) { return ss.done; });
      return '  - ' + (exInfo.name || ex.exercise_id) + ': ' + (done.length > 0 ? done.map(function(ss) { return ss.w + '\xd7' + ss.r; }).join('/') : '—');
    }).join('\n');
    const p = s.pain ? Object.entries(s.pain).map(function(e) { return e[0] + '=' + e[1]; }).join(', ') : '—';
    return '[' + s.date + '] 컨디션' + (s.condition || '?') + '/10, 통증: ' + p + '\n' + (exSummary || '  운동 없음');
  }).join('\n\n') || '없음';

  let todayExStr = '운동 없음';
  if (session && session.exercises && session.exercises.length > 0) {
    todayExStr = session.exercises.map(function(ex) {
      const exInfo = routine.exercises[ex.exercise_id] || {};
      const done = (ex.sets || []).filter(function(s) { return s.done; });
      return (exInfo.name || ex.exercise_id) + ': ' + (done.length > 0 ? done.map(function(s) { return s.w + '\xd7' + s.r; }).join('/') : '—');
    }).join('\n');
  }

  const pain = session ? (session.pain || {}) : {};
  const painStr = Object.entries(pain).map(function(e) { return e[0] + '=' + e[1]; }).join(', ') || '없음';
  const cond = session ? (session.condition || 7) : 7;
  const cycleStr = (session && session.cycling && session.cycling.done)
    ? session.cycling.minutes + '분, 강도' + session.cycling.intensity + '/10'
    : '안탔음';
  const meal = session ? (session.meal_note || '기록 없음') : '기록 없음';

  return `나는 168cm 71kg 초보자 남성. 5월 1차 노무사 시험 준비 중. 자전거 주 2-3회 고강도.
손목·허리 약한 통증 있음. 회복되면 3대(스쿼트/벤치/데드)로 복귀 목표.
영양 목표: 단백질 114g+/일.

현재 루틴: ${routine.id} (phase: ${routine.phase})
현재 통증: ${painStr}

최근 7일 세션:
${recentBlock}

오늘 (${getTodayISO()}):
- 운동:
${todayExStr}
- 컨디션: ${cond}/10
- 자전거: ${cycleStr}
- 식사: ${meal}

요청:
1. 오늘 식사 단백질/탄수 부족한지 피드백
2. 통증/피로/수행 기반 다음 1-2주 루틴 갱신안 — 반드시 아래 JSON 코드블록 형식으로:

\`\`\`json
{
  "id": "...",
  "phase": "recovery|transition|main",
  "notes": "...",
  "pain_rules": {},
  "exercises": {},
  "days": {"mon": [], "tue": [], "wed": [], "thu": [], "fri": [], "sat": [], "sun": []}
}
\`\`\``;
}

function copyGeminiPrompt() {
  saveReport();
  const prompt = buildGeminiPrompt();
  const resultEl = document.getElementById('copyResult');
  resultEl.style.display = '';

  const doFallback = function() {
    const ta = document.createElement('textarea');
    ta.value = prompt;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    resultEl.textContent = '복사됨 (fallback)';
  };

  if (navigator.clipboard) {
    navigator.clipboard.writeText(prompt).then(function() {
      resultEl.textContent = '클립보드에 복사됨';
    }).catch(doFallback);
  } else {
    doFallback();
  }
  setTimeout(function() { resultEl.style.display = 'none'; }, 3000);
}

// ============================================================
//  ROUTINE PARSER (shared by report + routine mgmt)
// ============================================================
function parseRoutineFromText(text) {
  const m = text.match(/```json\s*([\s\S]*?)```/);
  const raw = m ? m[1] : text;
  const cleaned = raw.trim()
    .replace(/\/\/[^\n]*/g, '')
    .replace(/\/\*[\s\S]*?\*\//g, '')
    .replace(/,\s*([}\]])/g, '$1');
  let obj;
  try { obj = JSON.parse(cleaned); } catch(e) { throw new Error('JSON 파싱 실패: ' + e.message); }
  if (!obj.id) throw new Error('id 필드 없음');
  if (!obj.phase) throw new Error('phase 필드 없음');
  if (!obj.exercises || typeof obj.exercises !== 'object') throw new Error('exercises 없음');
  if (!obj.days || typeof obj.days !== 'object') throw new Error('days 없음');
  ['mon','tue','wed','thu','fri','sat','sun'].forEach(function(k) {
    if (!obj.days[k]) obj.days[k] = [];
  });
  if (!obj.created_at) obj.created_at = new Date().toISOString();
  return obj;
}

function applyParsedRoutine(obj, geminiText) {
  DB.routines[obj.id] = obj;
  DB.meta.current_routine_id = obj.id;
  if (geminiText) {
    if (!DB.sessions[getTodayISO()]) {
      DB.sessions[getTodayISO()] = {
        date: getTodayISO(), weekday: getTodayDOW(), routine_id: obj.id,
        exercises: [], pain: {}, condition: 7,
        cycling: { done: false, minutes: 0, intensity: 0 },
        meal_note: '', gemini_response: geminiText,
        started_at: null, ended_at: null
      };
    } else {
      DB.sessions[getTodayISO()].gemini_response = geminiText;
    }
  }
  saveData(DB);
}

function deleteRoutine(id) {

  if (id === DB.meta.current_routine_id) { toast('현재 루틴은 다른 루틴 선택 후 삭제'); return; }
  delete DB.routines[id];

  renderRoutines();
  toast('삭제됨');
}

// ============================================================
//  NUM INPUT
// ============================================================
function adjustVal(elId, delta, minVal, isInt) {
  const el = document.getElementById(elId);
  // If inline edit is active, blur it first to commit the value
  const activeInp = el.querySelector('input');
  if (activeInp) activeInp.blur();
  let val = parseFloat(el.dataset.val) || 0;
  val = Math.max(minVal, val + delta);
  if (isInt) {
    val = Math.round(val);
  } else {
    // avoid float precision drift
    val = Math.round(val * 10) / 10;
  }
  el.textContent = val;
  el.dataset.val = val;
}

function activateNumEdit(el) {
  if (el.querySelector('input')) return; // already editing
  const curVal = el.dataset.val || '0';
  const isInt = el.id === 'rVal';
  const minVal = 0;
  const inp = document.createElement('input');
  inp.type = 'number';
  inp.inputMode = 'decimal';
  inp.className = 'num-val-input';
  inp.value = curVal;
  inp.min = minVal;
  el.textContent = '';
  el.appendChild(inp);
  inp.focus();
  inp.select();

  function commit() {
    let v = parseFloat(inp.value);
    if (isNaN(v) || v < minVal) v = parseFloat(curVal) || minVal;
    if (isInt) v = Math.round(v);
    else v = Math.round(v * 10) / 10;
    el.textContent = v;
    el.dataset.val = v;
  }
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { inp.blur(); }
  });
}

  });

  document.getElementById('btnTimerSkip').addEventListener('click', function() {

    timerDone();
  });
  document.getElementById('stretchHintToggle').addEventListener('click', function() {
    document.getElementById('stretchHintDetail').classList.toggle('open');
  });
  document.getElementById('btnAddSet').addEventListener('click', function() {
    if (!currentSession) return;
    const exEntry = currentSession.exercises[sessionExIdx];
    if (!exEntry) return;
    exEntry.extra_sets++;

    sessionSetIdx = exEntry.plan_sets + exEntry.extra_sets - 1;
    const totalSets = exEntry.plan_sets + exEntry.extra_sets;
    document.getElementById('setLabel').textContent = '세트 ' + (sessionSetIdx + 1) + ' / ' + totalSets;
    renderSetChips(exEntry);
  });
  document.getElementById('btnSkipEx').addEventListener('click', function() {
    stopTimer();
    advanceExercise();
  });
  document.getElementById('btnEndSession').addEventListener('click', function() {
    if (confirm('세션을 종료할까요?')) endSession();
  });

  document.getElementById('btnReportHome').addEventListener('click', function() {
    showScreen('screenHome');
    renderHome();
  });
  document.getElementById('btnSaveReport').addEventListener('click', saveReport);
  document.getElementById('btnCopyPrompt').addEventListener('click', copyGeminiPrompt);
  document.getElementById('btnAddPain').addEventListener('click', function() {
    const label = prompt('부위 이름 (예: 무릎, 어깨)');
    if (!label) return;
    const key = label.replace(/\s/g,'_').toLowerCase();

  document.getElementById('cycleYes').addEventListener('click', function() { setCycling(true); });

  document.getElementById('btnGoRoutines').addEventListener('click', function() {
    renderRoutines();
    showScreen('screenRoutines');
  });
  document.getElementById('btnParseRoutine').addEventListener('click', function() {
    const text = document.getElementById('geminiPaste').value.trim();
    const resultEl = document.getElementById('parseResult');
    resultEl.style.display = '';
    if (!text) { resultEl.className = ''; resultEl.textContent = '내용을 입력해주세요'; return; }
    try {
      const obj = parseRoutineFromText(text);
      applyParsedRoutine(obj, text);
      resultEl.className = 'ok';
      resultEl.textContent = '✓ 루틴 "' + obj.id + '" 적용됨 (phase: ' + obj.phase + ')';
      toast('루틴 "' + obj.id + '" 적용됨');
      renderHome();
    } catch(e) {
      resultEl.className = 'err';
      resultEl.textContent = '오류: ' + e.message;
    }
  });

  // Routines
  document.getElementById('btnRoutineBack').addEventListener('click', function() {
    showScreen('screenReport');
  });
  document.getElementById('btnAddRoutine').addEventListener('click', function() {
    const text = document.getElementById('routineJsonInput').value.trim();
    const resultEl = document.getElementById('routineAddResult');

    document.getElementById('stretchModal').classList.remove('open');
  });
  document.getElementById('stretchModal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });

  // Pain modal
  document.getElementById('btnClosePainModal').addEventListener('click', function() {
    savePainModal();
    document.getElementById('painModal').classList.remove('open');
  });
  document.getElementById('painModal').addEventListener('click', function(e) {
    if (e.target === this) {

      this.classList.remove('open');
    }
  });
});
